<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/frontend/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <title>Document</title>
</head>
<body>
    <header>
        <div id="createCluster">Create</div>
        <div id="headerTitle-Container">
            Title
        </div>
    </header>
    <main>
        <div id="clusterArea">
            
        </div>
        <template id="clusterTemplate">
            <div class="cluster-wrapper">
                <div class="clusterTitle">
                    <p>Topic</p>
                </div>
                <div class="cluster"></div>
            </div>
                
        </template>
        <div id="callArea">

        </div>
    </main>
    <div id="nameOverlay" class="overlay">
        <div class="modal-content">
            <h2>Enter a name for the Conversation</h2>
            <input type="text" id="nameInput" placeholder="Name...">
            <button id="submitNameBtn">Create</button>
        </div>
    </div>

    <div id="callInfosOverlay">
        <div id="callInfosContainer">
            <h2 id="callInfosTitle">Title</h2>
            <div class="joinCallBtn">Join</div>
            <div class="leaveBtn">Leave</div>
            <div class="backBtn">Back</div>
        </div>
    </div>

    <footer>Footer</footer>
</body>
<script src="/frontend/scripts/script.js"></script>
</html>
