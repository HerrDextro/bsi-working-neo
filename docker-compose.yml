services:
  mariadb-database:
    image: mariadb:latest # TODO replace with version number
    container_name: mariadb-database
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_USER: ${DB_USER}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  backend:
    build:
      context: .  # Set context to the ROOT
      dockerfile: Backend/CommBackend/CommBackend/Dockerfile
    tty: true      # Keeps the output stream open
    stdin_open: true 
    container_name: conn_api
    depends_on:
      mariadb-database:
        condition: service_healthy  # Only starts when DB is ready
    environment:
          - ASPNETCORE_URLS=http://+:8080
          - ASPNETCORE_ENVIRONMENT=Development
          - ConnectionStrings__DefaultConnection=${CONNECTION_STRING}
          - LiveKit__ApiKey=${LIVEKIT_API_KEY}
          - LiveKit__ApiSecret=${LIVEKIT_API_SECRET}
          - JwtConfig__Key=${JWT_SECRET}
    ports:
      - "${BACKEND_PORT}:8080"
    healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
          interval: 10s
          timeout: 5s
          retries: 3
    networks:
      - backend


  topic-service:
    build: 
      context: ./service
      dockerfile: Dockerfile
    container_name: conn_service
    depends_on: 
     - frontend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
     - "${SERVICE_PORT}:7197" #idk


  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: conn_ui
    depends_on:
      backend:
        condition: service_healthy # Only starts when API is ready
    ports:
      - "${FRONTEND_PORT}:80"

volumes:
  db_data:
networks:
  backend: